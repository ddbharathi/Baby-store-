<style>

<body>
<div id="app"></div>
<div id="toast" class="toast"></div>
<script>
// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyC2AarE6wb92i14kE2Lly3I5PeYOKq_em8",
  authDomain: "baby-store-a1b39.firebaseapp.com",
  projectId: "baby-store-a1b39",
  storageBucket: "baby-store-a1b39.firebasestorage.app",
  messagingSenderId: "452754922308",
  appId: "1:452754922308:web:6dc7ff7f8294e7b21cd511"
};

// ---------- Global state ----------
let products = [];
let categories = [];
let purchases = [];
let catalogueName = "Catalogue";
let npid = 1, nppid = 1;
let tab = "catalogue";
let filterCat = "All";
let openMenu = null, sheet = null, editId = null, editPId = null, newCat = "";
let searchVal = "";
let bulkMode = false;
let selectedProducts = new Set();
let firestoreEnabled = false, db = null, docRef = null, unsub = null, updating = false;
let firebaseErrorMsg = "";

// Default data
const DEFAULT_PRODUCTS = [
  {id:1, name:"100ml Itc", unit:"per packet", category:"Paper Cup", buyPrice:22, sellPrice:25, packetPrice:25, godown:"", note:""},
  {id:2, name:"10x12", unit:"per bag", category:"Plastic Bag", buyPrice:15, sellPrice:20, packetPrice:20, godown:"", note:""}
];
const DEFAULT_CATEGORIES = ["Paper Cup","Plastic Bag","Thermocol Plate","Aluminum Foil"];

function toast(msg,err){ const e=document.getElementById("toast"); e.className="toast"; e.style.background=err?"#e33":"#111"; e.textContent=msg; e.style.display="block"; setTimeout(()=>e.style.display="none",3000); }
function inr(v){ return (v===""||v==null)?"—":"₹"+Number(v).toFixed(2); }
function pendingCount(){ return purchases.filter(p=>!p.done).length; }

// Persistence
function persistToLocal(){
  localStorage.setItem("cat_products",JSON.stringify(products));
  localStorage.setItem("cat_cats",JSON.stringify(categories));
  localStorage.setItem("cat_purchases",JSON.stringify(purchases));
  localStorage.setItem("cat_npid",npid);
  localStorage.setItem("cat_nppid",nppid);
  localStorage.setItem("cat_name",catalogueName);
}
async function syncToFirestore(){
  if(!firestoreEnabled || !docRef || updating) return;
  try{ await docRef.set({products,categories,purchases,catalogueName,npid,nppid,updated:Date.now()}); }
  catch(e){ console.warn(e); }
}
function persist(){ persistToLocal(); syncToFirestore(); }

function loadFromLocal(){
  let storedProducts = localStorage.getItem("cat_products");
  if(storedProducts && storedProducts !== "[]" && storedProducts !== "null"){
    products = JSON.parse(storedProducts);
  } else {
    products = JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));
    npid = 3;
  }
  let storedCats = localStorage.getItem("cat_cats");
  if(storedCats && storedCats !== "[]" && storedCats !== "null"){
    categories = JSON.parse(storedCats);
  } else {
    categories = [...DEFAULT_CATEGORIES];
  }
  purchases = JSON.parse(localStorage.getItem("cat_purchases") || "[]");
  npid = Number(localStorage.getItem("cat_npid") || (products.length > 0 ? Math.max(...products.map(p=>p.id),0)+1 : 3));
  nppid = Number(localStorage.getItem("cat_nppid") || 1);
  catalogueName = localStorage.getItem("cat_name") || "Catalogue";
  let maxId = products.length ? Math.max(...products.map(p=>p.id)) : 2;
  if(npid <= maxId) npid = maxId + 1;
}

function resetSampleProducts(){
  if(confirm("Reset to 2 sample products? This will replace all current products.")){
    products = JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));
    categories = [...DEFAULT_CATEGORIES];
    purchases = [];
    npid = 3;
    nppid = 1;
    catalogueName = "Catalogue";
    persist();
    render();
    toast("Reset to sample products");
  }
}

// Firebase init
async function initFirebase(retry = false){
  if(!firebaseConfig.apiKey) { loadFromLocal(); firestoreEnabled=false; render(); return; }
  try{
    if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    await db.enablePersistence({synchronizeTabs:true}).catch(()=>{});
    await firebase.auth().signInAnonymously();
    docRef = db.collection("catalogues").doc("main_catalogue");
    const snap = await docRef.get();
    if(snap.exists){
      const d=snap.data();
      updating=true;
      products=d.products||[]; categories=d.categories||[]; purchases=d.purchases||[];
      catalogueName=d.catalogueName||"Catalogue"; npid=d.npid||1; nppid=d.nppid||1;
      updating=false;
      persistToLocal();
    } else { 
      loadFromLocal(); 
      await docRef.set({products,categories,purchases,catalogueName,npid,nppid}); 
    }
    firestoreEnabled=true;
    firebaseErrorMsg="";
    render();
    if(unsub) unsub();
    unsub = docRef.onSnapshot(s=>{
      if(!s.exists || updating) return;
      const d=s.data();
      updating=true;
      products=d.products||[]; categories=d.categories||[]; purchases=d.purchases||[];
      catalogueName=d.catalogueName||"Catalogue"; npid=d.npid||1; nppid=d.nppid||1;
      updating=false;
      persistToLocal();
      render();
      toast("🔄 Synced from cloud");
    });
    toast("Firebase connected! Cloud sync active");
  }catch(e){
    console.error(e);
    firebaseErrorMsg = e.message || "Unknown error";
    if(firebaseErrorMsg.includes("auth/configuration-not-found")){
      firebaseErrorMsg = "Enable Anonymous Auth in Firebase Console → Authentication → Sign-in methods";
    }
    loadFromLocal();
    firestoreEnabled=false;
    render();
    toast(`Firebase: ${firebaseErrorMsg.substring(0,100)}. Offline mode.`, true);
  }
}

// ---------- CRUD Operations ----------
function saveProductFromForm(){
  // Get values from the currently open sheet inputs
  const nameInput = document.getElementById("prod_name");
  const unitInput = document.getElementById("prod_unit");
  const catInput = document.getElementById("prod_category");
  const buyInput = document.getElementById("prod_buy");
  const sellInput = document.getElementById("prod_sell");
  const packetInput = document.getElementById("prod_packet");
  
  if(!nameInput || !nameInput.value.trim()){ toast("Product name required",true); return; }
  const name = nameInput.value.trim();
  const unit = unitInput.value.trim() || "per packet";
  const category = catInput ? catInput.value : "";
  const buyPrice = buyInput.value !== "" ? +buyInput.value : "";
  const sellPrice = sellInput.value !== "" ? +sellInput.value : "";
  const packetPrice = packetInput.value !== "" ? +packetInput.value : "";
  
  if(editId != null){
    products = products.map(p => p.id === editId ? {...p, name, unit, category, buyPrice, sellPrice, packetPrice} : p);
    toast("Product updated");
  } else {
    products = [...products, {id: npid, name, unit, category, buyPrice, sellPrice, packetPrice, godown:"", note:""}];
    npid++;
    toast("Product added");
  }
  sheet = null;
  editId = null;
  persist();
  render();
}

function savePurchaseFromForm(){
  const nameInput = document.getElementById("purchase_name");
  const qtyInput = document.getElementById("purchase_qty");
  const priceInput = document.getElementById("purchase_price");
  const noteInput = document.getElementById("purchase_note");
  
  if(!nameInput || !nameInput.value.trim()){ toast("Product name required",true); return; }
  const name = nameInput.value.trim();
  const qty = qtyInput.value || "1";
  const buyPrice = priceInput.value || "";
  const note = noteInput ? noteInput.value : "";
  
  if(editPId != null){
    purchases = purchases.map(p => p.id === editPId ? {...p, name, qty, buyPrice, note} : p);
    toast("Purchase updated");
  } else {
    purchases = [...purchases, {id: nppid, productId: null, name, qty, buyPrice, note, done: false}];
    nppid++;
    toast("Added to purchase list");
  }
  sheet = null;
  editPId = null;
  persist();
  render();
}

function delProduct(id){
  products=products.filter(p=>p.id!==id);
  purchases=purchases.filter(p=>p.productId!==id);
  selectedProducts.delete(id);
  openMenu=null; persist(); render(); toast("Deleted");
}
function openEdit(p){
  editId=p.id;
  sheet="product";
  // We'll set the form values in renderProductSheet
  render();
}
function addToPurchase(p){
  if(purchases.find(x=>x.productId===p.id && !x.done)){ toast("Already in list",true); return; }
  purchases=[...purchases,{id:nppid,productId:p.id,name:p.name,qty:"1",buyPrice:String(p.buyPrice||""),note:"",done:false}];
  nppid++; persist(); toast("Added to purchase"); render();
}
function toggleP(id){ purchases=purchases.map(p=>p.id===id?{...p,done:!p.done}:p); persist(); render(); }
function delP(id){ purchases=purchases.filter(p=>p.id!==id); persist(); render(); toast("Removed"); }
function clearDone(){ purchases=purchases.filter(p=>!p.done); persist(); render(); }
function addCat(){ const c=newCat.trim(); if(!c)return; if(categories.includes(c)){ toast("Exists",true); return; } categories=[...categories,c]; newCat=""; persist(); render(); }
function delCat(c){ categories=categories.filter(x=>x!==c); persist(); render(); }
function saveCatalogueName(name){ if(!name.trim())return; catalogueName=name.trim(); persist(); sheet=null; render(); toast("Renamed"); }

// Bulk mode
function enterBulkMode(){ bulkMode=true; selectedProducts.clear(); render(); }
function cancelBulkMode(){ bulkMode=false; selectedProducts.clear(); render(); }
function toggleSelectProduct(id){ if(selectedProducts.has(id)) selectedProducts.delete(id); else selectedProducts.add(id); renderCards(); }
function selectAllVisible(){
  let filtered = products.filter(p=> (filterCat==="All"||p.category===filterCat) && p.name.toLowerCase().includes(searchVal.toLowerCase()));
  filtered.forEach(p=>selectedProducts.add(p.id));
  renderCards();
}
function bulkDeleteSelected(){
  if(selectedProducts.size===0){ toast("No selection",true); return; }
  if(confirm(`Delete ${selectedProducts.size} product(s)?`)){
    products = products.filter(p=>!selectedProducts.has(p.id));
    purchases = purchases.filter(p=>!selectedProducts.has(p.productId));
    selectedProducts.clear();
    bulkMode=false;
    persist(); render();
    toast("Deleted");
  }
}

// Export / Import
function exportXL(){
  const wb=XLSX.utils.book_new();
  const catRow=[{"__catalogue_name__":catalogueName,"Product Name":"","Unit":"","Category":"","Buy Price (₹)":"","Sell Price (₹)":"","Packet Price (₹)":"","Godown":"","Note":""}];
  const productRows=products.map(p=>({"__catalogue_name__":"","Product Name":p.name,"Unit":p.unit,"Category":p.category,"Buy Price (₹)":p.buyPrice,"Sell Price (₹)":p.sellPrice,"Packet Price (₹)":p.packetPrice,"Godown":p.godown,"Note":p.note}));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet([...catRow,...productRows]),"Catalogue");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(purchases.map(p=>({"Product":p.name,"Qty":p.qty,"Buy Price (₹)":p.buyPrice,"Note":p.note,"Status":p.done?"Done":"Pending"}))),"Purchase");
  XLSX.writeFile(wb,(catalogueName||"Catalogue")+".xlsx");
  toast("Exported");
}
function triggerImport(){ document.getElementById("importFileInput")?.click(); }
function importXL(e){
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const wb=XLSX.read(ev.target.result,{type:"binary"});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws);
      if(rows.length && rows[0]["__catalogue_name__"]) catalogueName=rows[0]["__catalogue_name__"]||catalogueName;
      let id=npid;
      const existingNames=new Set(products.map(p=>p.name.trim().toLowerCase()));
      let imported=0, skipped=0, newCats=new Set();
      const newProds=[];
      for(let r of rows.filter(r=>r["Product Name"])){
        let name=r["Product Name"]?.trim(); if(!name) continue;
        if(existingNames.has(name.toLowerCase())){ skipped++; continue; }
        const cat=r["Category"]?.trim()||"";
        if(cat && !categories.includes(cat)) newCats.add(cat);
        newProds.push({id:id++, name, unit:r["Unit"]||"per packet", category:cat, buyPrice:r["Buy Price (₹)"]!==undefined?+r["Buy Price (₹)"]:"", sellPrice:r["Sell Price (₹)"]!==undefined?+r["Sell Price (₹)"]:"", packetPrice:r["Packet Price (₹)"]!==undefined?+r["Packet Price (₹)"]:"", godown:r["Godown"]||"", note:r["Note"]||""});
        imported++;
      }
      if(newCats.size) categories=[...categories,...newCats];
      products=[...products,...newProds];
      npid=id;
      persist();
      toast(`Imported ${imported} products (${skipped} duplicates). ${newCats.size} new categor${newCats.size===1?'y':'ies'}.`);
      render();
    }catch(err){ toast("Import failed",true); }
  };
  r.readAsBinaryString(f);
  e.target.value="";
}

// ---------- DOM helpers ----------
function el(t,c,txt){ let e=document.createElement(t); if(c)e.className=c; if(txt)e.textContent=txt; return e; }
function on(e,ev,fn){ e.addEventListener(ev,fn); return e; }
function sel(opts,val,onChange){ let s=el("select","finput"); opts.forEach(o=>{let opt=document.createElement("option"); opt.value=o.v||o; opt.textContent=o.l||o; if((o.v||o)===val)opt.selected=true; s.appendChild(opt);}); s.addEventListener("change",onChange); return s; }
function categoryPicker(val,onChange){
  let wrap=el("div","cat-picker");
  let input=el("input","cat-picker-input"); input.placeholder="Select or type"; input.value=val;
  let arrow=el("div","cat-picker-arrow","⌵");
  let dropdown=null;
  let close=()=>{ if(dropdown) dropdown.remove(); dropdown=null; };
  let show=()=>{ close(); dropdown=el("div","cat-dropdown"); categories.forEach(c=>{ let opt=el("div","cat-opt",c); if(c===val)opt.classList.add("selected"); opt.addEventListener("click",()=>{ input.value=c; onChange(c); close(); }); dropdown.appendChild(opt); }); let addOpt=el("div","cat-opt","+ Add new..."); addOpt.style.color="#0d9e8a"; addOpt.addEventListener("click",()=>{ sheet="categoryManager"; render(); }); dropdown.appendChild(addOpt); wrap.appendChild(dropdown); };
  input.addEventListener("focus",show);
  arrow.addEventListener("click",show);
  document.addEventListener("click",function(e){ if(!wrap.contains(e.target)) close(); });
  wrap.appendChild(input); wrap.appendChild(arrow);
  return wrap;
}

function renderCards(){
  let wrap=document.getElementById("cards-wrap");
  if(!wrap) return;
  let filtered=products.filter(p=>(filterCat==="All"||p.category===filterCat) && p.name.toLowerCase().includes(searchVal.toLowerCase()));
  if(filtered.length===0){ wrap.innerHTML="<div class='empty'>✨ No products. Tap + Add or ⋮ → Reset Sample Products</div>"; return; }
  let cardsDiv=el("div","cards");
  filtered.forEach(p=>{
    let card=el("div","card");
    if(bulkMode){
      let chk=el("input","bulk-checkbox"); chk.type="checkbox"; chk.checked=selectedProducts.has(p.id);
      chk.style.position="absolute"; chk.style.top="14px"; chk.style.right="14px"; chk.style.width="22px"; chk.style.height="22px";
      chk.addEventListener("change",()=>toggleSelectProduct(p.id));
      card.appendChild(chk);
    }
    let top=el("div","card-top");
    top.appendChild(el("span","card-name",p.name));
    top.appendChild(el("span","cat-badge",p.category||"Uncategorized"));
    let meta=el("div","card-meta",p.unit);
    meta.style.fontSize="12px"; meta.style.color="#aaa"; meta.style.marginBottom="8px";
    let prices=el("div","price-boxes");
    prices.innerHTML=`<div class="pbox pbox-buy"><div class="pbox-label">BUY</div><div class="pbox-val">${inr(p.buyPrice)}</div></div>
                      <div class="pbox pbox-sell"><div class="pbox-label">SELL</div><div class="pbox-val">${inr(p.sellPrice)}</div></div>
                      <div class="pbox pbox-pkt"><div class="pbox-label">PACKET</div><div class="pbox-val">${inr(p.packetPrice)}</div></div>`;
    let actions=el("div","card-actions");
    let editBtn=el("button","card-btn","✏️ Edit"); editBtn.addEventListener("click",()=>openEdit(p));
    let divider=el("div","card-divider"); divider.style.width="1px"; divider.style.background="#f0f0f0";
    let buyBtn=el("button","card-btn card-btn-green","🛒 Buy"); buyBtn.style.color="#0d9e8a"; buyBtn.addEventListener("click",()=>addToPurchase(p));
    let dotWrap=el("div","dot-wrap");
    let dotBtn=el("button","dot-btn","⋯"); dotBtn.addEventListener("click",(e)=>{ e.stopPropagation(); if(openMenu===p.id) openMenu=null; else openMenu=p.id; render(); });
    dotWrap.appendChild(dotBtn);
    if(openMenu===p.id){
      let menu=el("div","dot-menu");
      let delBtn=el("button","dot-del","🗑 Delete"); delBtn.addEventListener("click",()=>{ delProduct(p.id); openMenu=null; });
      menu.appendChild(delBtn);
      dotWrap.appendChild(menu);
    }
    actions.append(editBtn,divider,buyBtn,dotWrap);
    card.append(top,meta,prices,actions);
    cardsDiv.appendChild(card);
  });
  wrap.innerHTML=""; wrap.appendChild(cardsDiv);
}
function renderBulkBar(){
  let existing=document.getElementById("bulkBar");
  if(existing) existing.remove();
  if(!bulkMode) return;
  let bar=el("div","bulk-bar"); bar.id="bulkBar";
  bar.innerHTML=`<div class="bulk-info">${selectedProducts.size} selected</div>
                 <div class="bulk-actions">
                   <button class="bulk-btn" id="selectAllBtn">Select all</button>
                   <button class="bulk-btn bulk-delete" id="bulkDeleteBtn">Delete</button>
                   <button class="bulk-btn bulk-cancel" id="bulkCancelBtn">Cancel</button>
                 </div>`;
  document.getElementById("app").appendChild(bar);
  document.getElementById("selectAllBtn")?.addEventListener("click",selectAllVisible);
  document.getElementById("bulkDeleteBtn")?.addEventListener("click",bulkDeleteSelected);
  document.getElementById("bulkCancelBtn")?.addEventListener("click",cancelBulkMode);
}

// Sheet rendering with direct ID-based value retrieval
function renderProductSheet(){
  let s=el("div","sheet");
  s.innerHTML=`<div class="sheet-handle"></div><div class="sheet-title">${editId?"Edit Product":"New Product"}</div>
    <div class="field"><span class="flabel">Product name</span><input type="text" id="prod_name" class="finput" placeholder="Product name" value="${editId ? (products.find(p=>p.id===editId)?.name||'') : ''}"></div>
    <div class="field"><span class="flabel">Unit</span><input type="text" id="prod_unit" class="finput" placeholder="e.g., per packet" value="${editId ? (products.find(p=>p.id===editId)?.unit||'per packet') : 'per packet'}"></div>
    <div class="field"><span class="flabel">Category</span><div id="cat-picker-container"></div></div>
    <div class="field"><span class="flabel">Buy Price (₹)</span><input type="number" id="prod_buy" class="finput" placeholder="0" value="${editId ? (products.find(p=>p.id===editId)?.buyPrice||'') : ''}"></div>
    <div class="field"><span class="flabel">Sell Price (₹)</span><input type="number" id="prod_sell" class="finput" placeholder="0" value="${editId ? (products.find(p=>p.id===editId)?.sellPrice||'') : ''}"></div>
    <div class="field"><span class="flabel">Packet Price (₹)</span><input type="number" id="prod_packet" class="finput" placeholder="0" value="${editId ? (products.find(p=>p.id===editId)?.packetPrice||'') : ''}"></div>
    <button class="save-btn" id="productSaveBtn">✓ Save</button>
    <button class="cancel-btn" id="productCancelBtn">Cancel</button>`;
  // attach category picker
  setTimeout(()=>{
    const container = s.querySelector("#cat-picker-container");
    if(container){
      const currentCat = editId ? (products.find(p=>p.id===editId)?.category||'') : '';
      const picker = categoryPicker(currentCat, (val)=>{
        const catInput = s.querySelector("#prod_category");
        if(!catInput){
          const hidden = document.createElement("input");
          hidden.type="hidden";
          hidden.id="prod_category";
          hidden.value=val;
          s.appendChild(hidden);
        } else { catInput.value=val; }
      });
      container.appendChild(picker);
      // ensure hidden input exists
      if(!s.querySelector("#prod_category")){
        const hidden = document.createElement("input");
        hidden.type="hidden";
        hidden.id="prod_category";
        hidden.value=currentCat;
        s.appendChild(hidden);
      }
    }
  },0);
  let ov=el("div","overlay");
  ov.appendChild(s);
  document.getElementById("app").appendChild(ov);
  document.getElementById("productSaveBtn")?.addEventListener("click",saveProductFromForm);
  document.getElementById("productCancelBtn")?.addEventListener("click",()=>{ sheet=null; render(); });
}

function renderPurchaseSheet(){
  let s=el("div","sheet");
  const editing = editPId != null;
  const existing = editing ? purchases.find(p=>p.id===editPId) : null;
  s.innerHTML=`<div class="sheet-handle"></div><div class="sheet-title">${editing?"Edit Item":"Add to Purchase"}</div>
    <div class="field"><span class="flabel">Product name</span><input type="text" id="purchase_name" class="finput" placeholder="Product name" value="${existing ? existing.name : ''}"></div>
    <div class="field"><span class="flabel">Quantity</span><input type="number" id="purchase_qty" class="finput" placeholder="1" value="${existing ? existing.qty : '1'}"></div>
    <div class="field"><span class="flabel">Buy Price (₹)</span><input type="number" id="purchase_price" class="finput" placeholder="0" value="${existing ? existing.buyPrice : ''}"></div>
    <div class="field"><span class="flabel">Note</span><input type="text" id="purchase_note" class="finput" placeholder="Optional" value="${existing ? existing.note : ''}"></div>
    <button class="save-btn" id="purchaseSaveBtn">✓ Save</button>
    <button class="cancel-btn" id="purchaseCancelBtn">Cancel</button>`;
  let ov=el("div","overlay");
  ov.appendChild(s);
  document.getElementById("app").appendChild(ov);
  document.getElementById("purchaseSaveBtn")?.addEventListener("click",savePurchaseFromForm);
  document.getElementById("purchaseCancelBtn")?.addEventListener("click",()=>{ sheet=null; render(); });
}

function renderRenameSheet(){
  let s=el("div","sheet");
  s.innerHTML=`<div class="sheet-handle"></div><div class="sheet-title">Rename Catalogue</div>
    <input type="text" id="renameInput" class="finput" value="${catalogueName}">
    <button class="save-btn" id="renameSaveBtn">Save</button>
    <button class="cancel-btn" id="renameCancelBtn">Cancel</button>`;
  let ov=el("div","overlay");
  ov.appendChild(s);
  document.getElementById("app").appendChild(ov);
  document.getElementById("renameSaveBtn")?.addEventListener("click",()=>{
    let newName = document.getElementById("renameInput").value;
    if(newName.trim()) saveCatalogueName(newName);
    else toast("Name cannot be empty",true);
  });
  document.getElementById("renameCancelBtn")?.addEventListener("click",()=>{ sheet=null; render(); });
}

function renderCategorySheet(){
  let s=el("div","sheet");
  s.innerHTML=`<div class="sheet-handle"></div><div class="sheet-title">Manage Categories</div><div id="catList"></div><div class="cat-add-row" style="display:flex;gap:8px;margin-top:12px"><input id="newCatInput" placeholder="New category" style="flex:1;padding:10px;border-radius:10px;border:1px solid #ddd"/><button id="addCatBtn" style="padding:10px 16px;background:#111;color:#fff;border:none;border-radius:10px">+ Add</button></div><button class="cancel-btn" style="margin-top:16px">Close</button>`;
  setTimeout(()=>{
    const listDiv=s.querySelector("#catList");
    categories.forEach(c=>{ let row=el("div","cat-item"); row.style.display="flex"; row.style.justifyContent="space-between"; row.style.padding="8px 0"; row.innerHTML=`<span>${c}</span><button class="cat-del" data-cat="${c}" style="background:none;border:none;color:#e33;font-size:18px">🗑</button>`; row.querySelector(".cat-del")?.addEventListener("click",()=>delCat(c)); listDiv.appendChild(row); });
    const addBtn=s.querySelector("#addCatBtn"); const inpCat=s.querySelector("#newCatInput"); addBtn?.addEventListener("click",()=>{ newCat=inpCat.value; addCat(); inpCat.value=""; renderCategorySheet(); });
    s.querySelector(".cancel-btn")?.addEventListener("click",()=>{sheet=null;render();});
  },0);
  let ov=el("div","overlay");
  ov.appendChild(s);
  document.getElementById("app").appendChild(ov);
}

// ---------- Main render ----------
function render(){
  const app=document.getElementById("app"); app.innerHTML="";
  // header
  const hdr=el("div","hdr");
  const logoBtn=el("button","logo"); logoBtn.innerHTML=`${catalogueName}<span class="logo-edit">✏️</span>`;
  logoBtn.addEventListener("click",()=>{ sheet="rename"; render(); });
  hdr.appendChild(logoBtn);
  const right=el("div","hdr-right");
  const addBtn=el("button","hdr-btn hdr-add","+ Add");
  addBtn.addEventListener("click",()=>{ if(tab==="purchase"){ editPId=null; sheet="purchase"; } else{ editId=null; sheet="product"; } render(); });
  right.appendChild(addBtn);
  // 3-dot menu
  const dotHeader=el("div","dot-header");
  const dotBtn=el("button","dot-header-btn","⋮");
  let dropdownDiv=null;
  dotBtn.addEventListener("click",(e)=>{ e.stopPropagation(); if(dropdownDiv){ dropdownDiv.remove(); dropdownDiv=null; } else{ dropdownDiv=el("div","header-dropdown"); dropdownDiv.innerHTML=`<button id="menuBulk">🗑 Bulk Delete</button><button id="menuExport">📎 Export Excel</button><button id="menuImport">📥 Import Excel</button><button id="menuCats">🏷️ Manage Categories</button><button id="menuReset">🔄 Reset Sample Products</button>${!firestoreEnabled ? `<button id="menuRetryFirebase" style="color:#0d9e8a">🔄 Retry Firebase</button>` : ''}<button id="menuHelp" style="color:#888">❓ Enable Cloud Sync</button>`; dropdownDiv.querySelector("#menuBulk")?.addEventListener("click",()=>{ if(tab!=="catalogue"){ toast("Switch to Catalogue tab first",true); return; } enterBulkMode(); dropdownDiv?.remove(); dropdownDiv=null; }); dropdownDiv.querySelector("#menuExport")?.addEventListener("click",()=>{ exportXL(); dropdownDiv?.remove(); dropdownDiv=null; }); dropdownDiv.querySelector("#menuImport")?.addEventListener("click",()=>{ triggerImport(); dropdownDiv?.remove(); dropdownDiv=null; }); dropdownDiv.querySelector("#menuCats")?.addEventListener("click",()=>{ sheet="categoryManager"; dropdownDiv?.remove(); dropdownDiv=null; render(); }); dropdownDiv.querySelector("#menuReset")?.addEventListener("click",()=>{ resetSampleProducts(); dropdownDiv?.remove(); dropdownDiv=null; }); dropdownDiv.querySelector("#menuRetryFirebase")?.addEventListener("click",async()=>{ toast("Retrying Firebase..."); await initFirebase(true); dropdownDiv?.remove(); dropdownDiv=null; render(); }); dropdownDiv.querySelector("#menuHelp")?.addEventListener("click",()=>{ alert("To enable cloud sync:\n1. Firebase Console → Authentication → Sign-in methods → Enable Anonymous Auth\n2. Firestore Database → Rules → allow read, write: if request.auth != null;\n3. Then click Retry Firebase"); dropdownDiv?.remove(); dropdownDiv=null; }); dotHeader.appendChild(dropdownDiv); } });
  document.addEventListener("click",(e)=>{ if(!dotHeader.contains(e.target) && dropdownDiv){ dropdownDiv.remove(); dropdownDiv=null; } });
  dotHeader.appendChild(dotBtn);
  right.appendChild(dotHeader);
  if(firestoreEnabled){
    right.appendChild(el("span","sync-badge","☁️ Synced"));
  } else {
    let errSpan=el("span","firebase-error","⚠️ Offline mode");
    errSpan.title=firebaseErrorMsg;
    right.appendChild(errSpan);
  }
  hdr.appendChild(right); app.appendChild(hdr);
  // hidden file input
  let fileInput=el("input",""); fileInput.type="file"; fileInput.accept=".xlsx,.xls"; fileInput.style.display="none"; fileInput.id="importFileInput"; fileInput.addEventListener("change",importXL);
  app.appendChild(fileInput);
  // tabs
  const tabs=el("div","toptabs");
  [["catalogue","Catalogue"],["purchase","Purchase List"]].forEach(([v,l])=>{
    const b=el("button","toptab"+(tab===v?" active":""),l);
    if(v==="purchase"&&pendingCount()){ let bd=el("span","tbadge",String(pendingCount())); b.appendChild(bd); }
    b.addEventListener("click",()=>{ tab=v; bulkMode=false; selectedProducts.clear(); openMenu=null; render(); });
    tabs.appendChild(b);
  });
  app.appendChild(tabs);
  // main content
  if(tab==="catalogue"){
    const sb=el("div","searchbar");
    const si=el("input",""); si.placeholder="Search..."; si.value=searchVal; si.addEventListener("input",e=>{ searchVal=e.target.value; renderCards(); });
    const cs=sel(["All",...categories],filterCat,e=>{ filterCat=e.target.value; renderCards(); });
    cs.style.width="110px";
    sb.append(si,cs);
    app.appendChild(sb);
    const cardsWrap=el("div",""); cardsWrap.id="cards-wrap"; app.appendChild(cardsWrap);
    renderCards();
    renderBulkBar();
  } else if(tab==="purchase"){
    app.appendChild(on(el("button","add-p-btn","+ Add to Purchase List"),"click",()=>{ editPId=null; sheet="purchase"; render(); }));
    const pendingDiv=el("div",""), doneDiv=el("div","");
    const renderList=(list,container,title)=>{
      if(!list.length) return;
      const hdrDiv=el("div","sec-hdr"); hdrDiv.appendChild(el("div","sec-title",title));
      if(title==="Completed" && list.length){ let clr=el("button","clear-btn","Clear all"); clr.addEventListener("click",clearDone); hdrDiv.appendChild(clr); }
      container.appendChild(hdrDiv);
      list.forEach(p=>{
        const pc=el("div","p-card"+(p.done?" p-done":""));
        const row=el("div","p-row");
        const chk=el("input","p-check"); chk.type="checkbox"; chk.checked=!!p.done; chk.addEventListener("change",()=>toggleP(p.id));
        const nameDiv=el("div","p-name",p.name); const sub=el("div","p-sub",p.qty+" × "+inr(p.buyPrice)); nameDiv.appendChild(sub);
        const priceSpan=el("div","p-price",inr((+p.qty)*(+p.buyPrice||0)));
        const acts=el("div","p-acts");
        const editBtn=el("button","p-edit-btn","Edit"); editBtn.addEventListener("click",()=>{ editPId=p.id; sheet="purchase"; render(); });
        const delBtn=el("button","p-del-btn","🗑"); delBtn.addEventListener("click",()=>delP(p.id));
        acts.append(editBtn,delBtn);
        row.append(chk,nameDiv,priceSpan,acts);
        pc.appendChild(row);
        container.appendChild(pc);
      });
    };
    renderList(purchases.filter(p=>!p.done), pendingDiv, "To Buy");
    renderList(purchases.filter(p=>p.done), doneDiv, "Completed");
    app.appendChild(pendingDiv); app.appendChild(doneDiv);
  }
  // sheets
  if(sheet==="product") renderProductSheet();
  else if(sheet==="purchase") renderPurchaseSheet();
  else if(sheet==="rename") renderRenameSheet();
  else if(sheet==="categoryManager") renderCategorySheet();
}
initFirebase();
</script>
